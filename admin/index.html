<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leonex Admin — Mission Control</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <link rel="stylesheet" href="./css/admin.css">
    <script>
        // Global Error Catcher for Debugging
        window.onerror = function(msg, url, lineNo, columnNo, error) {
            const errStr = msg + '\nAt: ' + url + ':' + lineNo;
            console.error('[FATAL]', errStr);
            const content = document.getElementById('admin-content');
            if (content) {
                content.innerHTML = '<div style="background:#200; color:#f88; padding:20px; border-radius:12px; font-family:monospace; white-space:pre-wrap; border:1px solid #500;">' +
                                   '<b>[SYSTEM_CRASH]</b><br><br>' + errStr + '</div>';
            }
            return false;
        };
    </script>
    <style>
        /* Emergency Fallback Styles */
        #admin-app:empty::before {
            content: 'Initializing Mission Control...';
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #666; font-family: monospace; font-size: 14px;
        }
    </style>
</head>
<body>
    <div id="admin-app">
        <aside class="admin-sidebar" id="admin-sidebar"></aside>
        <main class="admin-main">
            <header class="admin-topbar" id="admin-topbar"></header>
            <div class="admin-content" id="admin-content">
                <div style="text-align:center; padding:100px; color:#555; font-family:sans-serif;">
                    Loading system components...
                </div>
            </div>
        </main>
    </div>
    <script type="module" src="./js/main.js"></script>
</body>
</html>
